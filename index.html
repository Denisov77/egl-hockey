<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGL Hockey</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'Courier New',monospace;color:#fff}
.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:100;background:#0a0a0f;flex-direction:column}
.overlay.show{display:flex}

#splash{z-index:1000;transition:opacity 1s}
#splash.hide{opacity:0;pointer-events:none}
.egl-container{display:flex;flex-direction:column;align-items:center;gap:6px}
.egl-line{display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(40px);transition:all .7s cubic-bezier(.22,1,.36,1)}
.egl-line.show{opacity:1;transform:translateY(0)}
.egl-letter{font-size:clamp(60px,12vw,120px);font-weight:900;line-height:1;color:#fff}
@keyframes letterIn{0%{opacity:0;transform:scale(2.5);filter:blur(20px)}60%{opacity:1;transform:scale(.92);filter:blur(0)}100%{opacity:1;transform:scale(1);filter:blur(0)}}
.egl-line.show .egl-letter{animation:letterIn .6s cubic-bezier(.22,1,.36,1) forwards}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px rgba(255,255,255,.3),0 0 40px rgba(255,255,255,.15)}50%{text-shadow:0 0 40px rgba(255,255,255,.5),0 0 80px rgba(255,255,255,.25)}}
.egl-line.show .egl-letter{animation:letterIn .6s cubic-bezier(.22,1,.36,1) forwards,glowPulse 2.5s ease-in-out .6s infinite}
.egl-sub{display:flex;align-items:center;gap:12px;margin-top:4px;opacity:0;transform:translateX(15px);transition:all .5s .3s}
.egl-line.show .egl-sub{opacity:1;transform:translateX(0)}
.egl-sub-line{width:30px;height:1px;background:rgba(255,255,255,.2)}
.egl-meaning{font-size:clamp(10px,1.6vw,14px);color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase}
.cmd-line{position:fixed;bottom:clamp(24px,5vh,60px);right:clamp(24px,4vw,60px);font-size:clamp(11px,1.4vw,14px);color:rgba(255,255,255,.3);opacity:0;transition:opacity .8s 0s;white-space:nowrap}
.cmd-line.show{opacity:1}
.cursor{display:inline-block;width:7px;height:1.1em;background:rgba(255,255,255,.45);animation:blink 1.1s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{50%{opacity:0}}
.scanline{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);z-index:1001;opacity:0;transition:opacity 1s 2s}
.scanline.show{opacity:1}

.box{text-align:center}
.box h2{font-size:28px;letter-spacing:4px;margin-bottom:6px}
.box p{font-size:12px;color:rgba(255,255,255,.3);margin-bottom:24px;letter-spacing:2px}
.inp{display:block;width:260px;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#fff;font-family:inherit;font-size:13px;letter-spacing:1px;margin:0 auto 12px;outline:none;transition:border-color .2s}
.inp:focus{border-color:rgba(255,255,255,.3)}
.inp::placeholder{color:rgba(255,255,255,.2)}
.btn{display:block;width:260px;padding:10px;margin:0 auto;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;font-family:inherit;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)}
.btn-sm{display:inline-block;width:auto;padding:10px 24px;margin:0 4px}
.err{font-size:11px;color:rgba(255,80,80,.7);height:16px;letter-spacing:1px;margin-top:4px}

.spinner{width:50px;height:50px;border:2px solid rgba(255,255,255,.08);border-top-color:rgba(255,255,255,.4);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}

.menu-title{font-size:clamp(32px,6vw,52px);font-weight:900;letter-spacing:6px;margin-bottom:4px}
.menu-sub{font-size:12px;color:rgba(255,255,255,.25);letter-spacing:3px;margin-bottom:40px}
.btn-menu{display:block;width:200px;padding:12px;margin:6px auto;background:none;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-family:inherit;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.btn-menu:hover{border-color:rgba(255,255,255,.35);color:#fff;background:rgba(255,255,255,.04)}

.result-title{font-size:36px;font-weight:900;letter-spacing:4px;margin-bottom:8px}
.result-sub{font-size:13px;color:rgba(255,255,255,.35);margin-bottom:8px;letter-spacing:1px}
.result-reward{font-size:14px;color:rgba(255,215,0,.7);margin-bottom:24px;letter-spacing:1px}

#shopPanel{position:fixed;right:-360px;top:0;bottom:0;width:340px;background:rgba(10,10,15,.97);border-left:1px solid rgba(255,255,255,.06);z-index:200;transition:right .4s cubic-bezier(.22,1,.36,1);padding:24px;overflow-y:auto;backdrop-filter:blur(20px)}
#shopPanel.open{right:0}
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.shop-title{font-size:16px;letter-spacing:3px;color:rgba(255,255,255,.7)}
.shop-coins{font-size:13px;color:rgba(255,215,0,.6);letter-spacing:1px}
.shop-close{background:none;border:none;color:rgba(255,255,255,.3);font-size:20px;cursor:pointer;transition:color .2s}
.shop-close:hover{color:#fff}
.up-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative}
.up-item:hover{border-color:rgba(255,255,255,.15)}
.up-item.maxed{opacity:.3;pointer-events:none}
.up-name{font-size:12px;color:rgba(255,255,255,.7);letter-spacing:1px;margin-bottom:4px}
.up-desc{font-size:10px;color:rgba(255,255,255,.25);margin-bottom:8px}
.up-bottom{display:flex;justify-content:space-between;align-items:center}
.up-cost{font-size:11px;color:rgba(255,215,0,.5)}
.up-lv{font-size:10px;color:rgba(255,255,255,.3)}
.up-bar{width:100%;height:2px;background:rgba(255,255,255,.05);margin-top:8px}
.up-bar-fill{height:100%;background:rgba(255,255,255,.3);transition:width .3s}

#gameWrap{display:none;position:fixed;inset:0;z-index:5;align-items:center;justify-content:center;background:#0a0a0f}
#gameWrap.show{display:flex}
canvas{display:block;border:1px solid rgba(255,255,255,.06)}
#hud{position:fixed;top:0;left:0;right:0;padding:10px 20px;display:none;justify-content:space-between;align-items:center;z-index:10}
#hud.show{display:flex}
.hud-left{display:flex;align-items:center;gap:16px}
.hud-names{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:1px}
.hud-score{font-size:22px;font-weight:700;letter-spacing:2px}
.hud-score .me{color:rgba(255,255,255,.9)}
.hud-score .sep{color:rgba(255,255,255,.15);margin:0 6px}
.hud-score .en{color:rgba(255,255,255,.9)}
.hud-btns{display:flex;gap:8px}
.hud-shop{background:none;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4);padding:5px 12px;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:1px;transition:all .2s}
.hud-shop:hover{border-color:rgba(255,255,255,.3);color:#fff}
#goalFx{position:fixed;inset:0;pointer-events:none;z-index:15;opacity:0;transition:opacity .15s}
#goalFx.show{opacity:1}

#waitingBar{position:fixed;bottom:0;left:0;height:2px;background:rgba(255,255,255,.15);z-index:200;transition:width .3s;width:0}

@media(max-width:768px){#shopPanel{width:100%;right:-100%}}
</style>
</head>
<body>

<div id="scanline" class="scanline"></div>
<div id="goalFx"></div>
<div id="waitingBar"></div>

<div id="splash" class="overlay show">
  <div class="egl-container">
    <div class="egl-line"><span class="egl-letter">E</span><div class="egl-sub"><span class="egl-sub-line"></span><span class="egl-meaning">egorenchikxxer</span></div></div>
    <div class="egl-line"><span class="egl-letter">G</span><div class="egl-sub"><span class="egl-sub-line"></span><span class="egl-meaning">gliter</span></div></div>
    <div class="egl-line"><span class="egl-letter">L</span><div class="egl-sub"><span class="egl-sub-line"></span><span class="egl-meaning">lab</span></div></div>
  </div>
  <div class="cmd-line" id="cmdLine"><span class="cmd-text"></span><span class="cursor"></span></div>
</div>

<div id="loginScreen" class="overlay">
  <div class="box">
    <h2>EGL HOCKEY</h2>
    <p>enter credentials to continue</p>
    <input class="inp" id="loginUser" placeholder="login" autocomplete="off">
    <input class="inp" id="loginPass" type="password" placeholder="password" autocomplete="off">
    <button class="btn" id="loginBtn">LOGIN</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="searchScreen" class="overlay">
  <div class="box">
    <p style="margin-bottom:20px">SEARCHING FOR MATCH</p>
    <div class="spinner"></div>
    <p style="font-size:11px;color:rgba(255,255,255,.2)">finding opponent</p>
    <div style="margin-top:20px"><button class="btn" id="cancelSearch" style="width:auto;display:inline-block;padding:8px 24px">CANCEL</button></div>
  </div>
</div>

<div id="menuScreen" class="overlay">
  <div class="menu-title">EGL HOCKEY</div>
  <div class="menu-sub" id="welcomeMsg">push the puck. score goals.</div>
  <button class="btn-menu" id="btnPlay">PLAY</button>
  <button class="btn-menu" id="btnShop">SHOP</button>
</div>

<div id="resultScreen" class="overlay">
  <div class="result-title" id="resultTitle">YOU WIN</div>
  <div class="result-sub" id="resultSub"></div>
  <div class="result-reward" id="resultReward"></div>
  <button class="btn-menu" id="btnRematch">REMATCH</button>
  <button class="btn-menu" id="btnBackMenu">MENU</button>
</div>

<div id="shopPanel">
  <div class="shop-header">
    <div class="shop-title">// SHOP</div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="shop-coins" id="shopCoins">$ 0</div>
      <button class="shop-close" id="shopClose">&times;</button>
    </div>
  </div>
  <div id="shopList"></div>
</div>

<div id="gameWrap"><canvas id="c"></canvas></div>
<div id="hud">
  <div class="hud-left">
    <div class="hud-score"><span class="me" id="hMe">0</span><span class="sep">:</span><span class="en" id="hEn">0</span></div>
    <div class="hud-names" id="hudNames"></div>
  </div>
  <div class="hud-btns">
    <button class="hud-shop" id="hudShop">SHOP</button>
    <button class="hud-shop" id="hudLeave">LEAVE</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W=900,H=500;
canvas.width=W;canvas.height=H;
const PUCK_R=8;

let state='splash';
let playerLogin='';
let mySide=0;
let coins=parseInt(localStorage.getItem('egl_coins')||'0');
let ws=null;
let lastState=null;
let opponentName='';

const upgrades={
  speed:{name:'Speed',desc:'Move your circle faster',max:5,cost:[30,80,180,400,800],level:0},
  push:{name:'Push Power',desc:'Hit puck harder',max:5,cost:[40,100,220,450,900],level:0},
  goal:{name:'Goal Size',desc:'Smaller goal for opponent',max:5,cost:[60,150,320,640,1200],level:0}
};
Object.keys(upgrades).forEach(k=>{upgrades[k].level=parseInt(localStorage.getItem('egl_up_'+k)||'0')});
function save(){localStorage.setItem('egl_coins',coins);Object.keys(upgrades).forEach(k=>localStorage.setItem('egl_up_'+k,upgrades[k].level))}

const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true});
window.addEventListener('keyup',e=>{keys[e.key]=false});

let mouseX=W/2,mouseY=H/2;
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
  mouseY=(e.clientY-r.top)*(H/r.height);
});

function show(id){
  document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show'));
  document.getElementById('gameWrap').classList.remove('show');
  document.getElementById('gameWrap').style.display='none';
  document.getElementById('hud').classList.remove('show');
  document.getElementById('hud').style.display='';
  document.getElementById(id).classList.add('show');
  if(id==='gameWrap')document.getElementById('gameWrap').style.display='flex';
}

// SPLASH
const commands=['git push --force','npm run dev','make it work','git blame','kill -9 1'];
let cmdIdx=0,charIdx=0;
function typeCmd(){
  const el=document.querySelector('.cmd-text');
  const c=commands[cmdIdx];
  if(charIdx<=c.length){el.textContent='$ '+c.substring(0,charIdx);charIdx++;setTimeout(typeCmd,55+Math.random()*35)}
  else{setTimeout(()=>{charIdx=0;cmdIdx=(cmdIdx+1)%commands.length;el.textContent='';typeCmd()},2200)}
}
setTimeout(()=>{
  const lines=document.querySelectorAll('.egl-line');
  lines.forEach((l,i)=>setTimeout(()=>l.classList.add('show'),400+i*700));
  setTimeout(()=>{document.querySelector('.cmd-line').classList.add('show');document.querySelector('.scanline').classList.add('show');typeCmd()},2800);
  setTimeout(()=>{document.getElementById('splash').classList.add('hide');setTimeout(()=>show('loginScreen'),800)},6500);
},200);

// LOGIN
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus()});
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  if(!u||!p){document.getElementById('loginErr').textContent='fill in all fields';return}
  playerLogin=u;
  document.getElementById('welcomeMsg').textContent='welcome, '+u;
  connectWs();
}

function connectWs(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host);
  ws.onopen=()=>{
    ws.send(JSON.stringify({type:'join',name:playerLogin,upgradePush:upgrades.push.level,upgradeSpeed:upgrades.speed.level}));
  };
  ws.onmessage=(e)=>{
    let msg;try{msg=JSON.parse(e.data)}catch{return}
    handleMessage(msg);
  };
  ws.onclose=()=>{
    if(state==='playing'||state==='searching'){
      endRound(false,'disconnected');
    }
  };
  show('searchScreen');
  state='searching';
  animateWaitBar();
}

function animateWaitBar(){
  const bar=document.getElementById('waitingBar');
  if(state!=='searching'){bar.style.width='0';return}
  let w=parseFloat(bar.style.width)||0;
  w+=0.3;if(w>95)w=0;
  bar.style.width=w+'%';
  requestAnimationFrame(animateWaitBar);
}

document.getElementById('cancelSearch').onclick=()=>{
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'cancel'}));
  ws.close();ws=null;
  show('menuScreen');state='menu';
};

function handleMessage(msg){
  switch(msg.type){
    case 'queued':
      state='searching';
      break;
    case 'matched':
      state='playing';
      mySide=msg.side;
      opponentName=msg.opponent;
      document.getElementById('hudNames').textContent=playerLogin+' vs '+opponentName;
      show('gameWrap');
      document.getElementById('hud').classList.add('show');
      document.getElementById('shopPanel').classList.remove('open');
      break;
    case 'state':
      lastState=msg;
      break;
    case 'goal':
      document.getElementById('hMe').textContent=msg.score[mySide];
      document.getElementById('hEn').textContent=msg.score[1-mySide];
      document.getElementById('goalFx').style.background='rgba(255,255,255,.06)';
      document.getElementById('goalFx').classList.add('show');
      setTimeout(()=>document.getElementById('goalFx').classList.remove('show'),200);
      break;
    case 'gameover':
      endRound(msg.won,msg.score);
      break;
    case 'opponent_left':
      endRound(true,'opponent left');
      break;
  }
}

// INPUT
function sendInput(){
  if(!ws||ws.readyState!==1||state!=='playing')return;
  let dx=0,dy=0;
  if(keys['w']||keys['ArrowUp'])dy=-1;
  if(keys['s']||keys['ArrowDown'])dy=1;
  if(keys['a']||keys['ArrowLeft'])dx=-1;
  if(keys['d']||keys['ArrowRight'])dx=1;
  ws.send(JSON.stringify({type:'input',dx,dy}));
}
setInterval(sendInput,1000/30);

// RENDER
function draw(){
  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
  if(!lastState)return;

  const s=lastState;
  const goalH=100-upgrades.goal.level*8;
  const gY=H/2-goalH/2;

  // Center line & circle
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.beginPath();ctx.arc(W/2,H/2,50,0,Math.PI*2);ctx.stroke();

  // Goals
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=2;
  ctx.strokeRect(0,gY,10,goalH);
  ctx.strokeRect(W-10,gY,10,goalH);

  // Territory line glow
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();

  // Puck trail (simple)
  ctx.beginPath();ctx.arc(s.puck.x,s.puck.y,PUCK_R,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;

  // My circle
  const myP=mySide===0?s.p0:s.p1;
  const enP=mySide===0?s.p1:s.p0;
  ctx.beginPath();ctx.arc(myP.x,myP.y,30,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=2.5;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.07)';ctx.fill();
  ctx.beginPath();ctx.arc(myP.x,myP.y,3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.8)';ctx.fill();

  // Enemy circle
  ctx.beginPath();ctx.arc(enP.x,enP.y,30,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.03)';ctx.fill();
  ctx.beginPath();ctx.arc(enP.x,enP.y,3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.3)';ctx.fill();
}

function gameLoop(){draw();requestAnimationFrame(gameLoop)}
gameLoop();

// GAME END
function endRound(won,scoreOrMsg){
  state='menu';
  document.getElementById('hud').style.display='none';
  document.getElementById('gameWrap').classList.remove('show');
  document.getElementById('gameWrap').style.display='none';
  document.getElementById('waitingBar').style.width='0';
  if(typeof scoreOrMsg==='object'){
    const s=scoreOrMsg;
    document.getElementById('resultTitle').textContent=won?'YOU WIN':'YOU LOSE';
    document.getElementById('resultTitle').style.color=won?'rgba(255,255,255,.9)':'rgba(255,255,255,.4)';
    document.getElementById('resultSub').textContent=s[mySide]+' - '+s[1-mySide];
    document.getElementById('resultReward').textContent=won?'+50 coins':'+15 coins';
  }else{
    document.getElementById('resultTitle').textContent=won?'YOU WIN':'YOU LOSE';
    document.getElementById('resultTitle').style.color=won?'rgba(255,255,255,.9)':'rgba(255,255,255,.4)';
    document.getElementById('resultSub').textContent=scoreOrMsg||'';
    document.getElementById('resultReward').textContent=won?'+50 coins':'+15 coins';
  }
  if(won){coins+=50}else{coins+=15}
  save();
  lastState=null;
  show('resultScreen');
}

// MENU
document.getElementById('btnPlay').onclick=()=>connectWs();
document.getElementById('btnShop').onclick=()=>toggleShop();
document.getElementById('btnRematch').onclick=()=>connectWs();
document.getElementById('btnBackMenu').onclick=()=>show('menuScreen');
document.getElementById('hudShop').onclick=()=>toggleShop();
document.getElementById('hudLeave').onclick=()=>{
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'leave'}));
  ws.close();ws=null;
  document.getElementById('hud').style.display='none';
  document.getElementById('gameWrap').classList.remove('show');
  document.getElementById('gameWrap').style.display='none';
  document.getElementById('waitingBar').style.width='0';
  state='menu';lastState=null;
  show('menuScreen');
};
document.getElementById('shopClose').onclick=()=>toggleShop();

function toggleShop(){
  document.getElementById('shopPanel').classList.toggle('open');
  if(document.getElementById('shopPanel').classList.contains('open'))renderShop();
}

function renderShop(){
  document.getElementById('shopCoins').textContent='$ '+coins;
  const list=document.getElementById('shopList');
  list.innerHTML='';
  Object.keys(upgrades).forEach(k=>{
    const u=upgrades[k];const lv=u.level;const maxed=lv>=u.max;const cost=maxed?0:u.cost[lv];const can=coins>=cost&&!maxed;
    const d=document.createElement('div');
    d.className='up-item'+(maxed?' maxed':'');
    d.innerHTML=`<div class="up-name">${u.name}</div><div class="up-desc">${u.desc}</div><div class="up-bottom"><div class="up-cost">${maxed?'MAX':cost+' coins'}</div><div class="up-lv">LV ${lv}/${u.max}</div></div><div class="up-bar"><div class="up-bar-fill" style="width:${(lv/u.max)*100}%"></div></div>`;
    if(can)d.onclick=()=>{coins-=cost;u.level++;save();renderShop()};
    list.appendChild(d);
  });
}
</script>
</body>
</html>
